start_heating_cycle:
  name: Start Heating Cycle
  description: >
    Starts a new daily heating cycle.
    Places the state machine in HEATING_ON mode (active heating).
    Use this service to force the start of a new cycle.
  fields:
    entry_id:
      name: Entry ID
      description: >
        The SmartHRTX instance ID (multi-instance). If you have multiple instances,
        specify the entry_id to target a specific instance.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

stop_heating:
  name: Stop Heating
  description: >
    Stops heating and starts the nightly monitoring phase.
    Activates temperature lag detection then starts recovery calculations.
    Transitions: HEATING_ON → DETECTING_LAG → MONITORING.
  fields:
    entry_id:
      name: Entry ID
      description: >
        The SmartHRTX instance ID (multi-instance). If you have multiple instances,
        specify the entry_id to target a specific instance.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

start_recovery:
  name: Start Recovery
  description: >
    Starts the heating recovery phase to reach the target temperature
    at wake-up time. Automatically calculates RCth and activates RPth calculation.
    Transitions: MONITORING → RECOVERY → HEATING_PROCESS.
  fields:
    entry_id:
      name: Entry ID
      description: >
        The SmartHRTX instance ID (multi-instance). If you have multiple instances,
        specify the entry_id to target a specific instance.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

end_recovery:
  name: End Recovery
  description: >
    Ends the recovery phase (target reached or target time reached).
    Calculates RPth and returns to normal heating mode.
    Transition: HEATING_PROCESS → HEATING_ON.
  fields:
    entry_id:
      name: Entry ID
      description: >
        The SmartHRTX instance ID (multi-instance). If you have multiple instances,
        specify the entry_id to target a specific instance.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

get_state:
  name: Get State
  description: >
    Returns the current state machine state with all details
    (temperatures, times, thermal coefficients, active modes).
    Useful for debugging and monitoring.
  fields:
    entry_id:
      name: Entry ID
      description: >
        The SmartHRTX instance ID (multi-instance). If you have multiple instances,
        specify the entry_id to target a specific instance.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

reset_learning:
  name: Reset Learning
  description: >
    Resets all learned thermal coefficients (RCth, RPth and their
    wind variants) to default values (50). Use this service if learned
    values have become inaccurate, for example after modifications to
    the home or insulation.
  fields:
    entry_id:
      name: Entry ID
      description: >
        The SmartHRTX instance ID (multi-instance). If you have multiple instances,
        specify the entry_id to target a specific instance.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:

trigger_calculation:
  name: Trigger Calculation
  description: >
    Immediately triggers a new recovery time calculation.
    Useful after modifying parameters to see the effect immediately
    without waiting for the next automatic calculation.
  fields:
    entry_id:
      name: Entry ID
      description: >
        The SmartHRTX instance ID (multi-instance). If you have multiple instances,
        specify the entry_id to target a specific instance.
      required: false
      advanced: true
      example: "abc123def456"
      selector:
        text:
